# Career Ops — London E-commerce Portal Configuration
# Scanner targets for Shreya's job search (ops/vendor/catalogue/platform roles)

title_filter:
  include:
    - operations
    - vendor
    - seller
    - catalogue
    - catalog
    - platform
    - marketplace
    - onboarding
    - merchandising
    - e-commerce
    - ecommerce
    - content ops
    - partner
    - data governance
  exclude:
    - junior
    - graduate
    - intern
    - apprentice
    - engineer
    - developer
    - software
    - data scientist
    - data analyst
    - machine learning
    - finance
    - accounting
    - financial
    - hr
    - human resources
    - recruiter
    - talent
    - sales
    - account manager
    - business development
    - logistics
    - supply chain
    - warehouse
    - driver
    - delivery
    - demand planning
    - forecasting

location_filter:
  include:
    - london
    - hybrid
    - remote
    - uk
    - united kingdom
    - greater london

