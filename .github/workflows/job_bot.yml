name: Weekly London Job Digest

on:
  # Every Monday at 8:00 AM UTC (covers GMT winter; adjust to 7:00 UTC for BST summer)
  schedule:
    - cron: '0 8 * * 1'

  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to push to gh-pages branch

jobs:
  send-job-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job bot
        env:
          ADZUNA_APP_ID:     ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:    ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          FROM_EMAIL:        ${{ secrets.FROM_EMAIL }}
          TO_EMAIL:          ${{ secrets.TO_EMAIL }}
        run: python job_bot.py

      - name: Copy frontend to output/
        run: mkdir -p output && cp frontend/index.html output/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: false
          commit_message: "chore: update job digest ${{ github.run_id }}"

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-digest
          path: output/
          if-no-files-found: ignore
